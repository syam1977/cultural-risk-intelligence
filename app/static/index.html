<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cultural Risk Intelligence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Helvetica Neue", Arial, "Hiragino Sans", sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.5rem; color: #38bdf8; }
    .subtitle { text-align: center; color: #94a3b8; margin-bottom: 2rem; font-size: 0.875rem; }
    #log { background: #1e293b; border-radius: 8px; padding: 1rem; height: 400px; overflow-y: auto; margin-bottom: 1rem; font-size: 0.875rem; line-height: 1.6; }
    .msg { padding: 0.25rem 0; }
    .msg.user { color: #38bdf8; }
    .msg.agent { color: #a5f3fc; }
    .msg.analysis { color: #34d399; white-space: pre-wrap; }
    .msg.system { color: #64748b; font-style: italic; }
    .controls { display: flex; gap: 0.5rem; }
    input[type="text"] { flex: 1; padding: 0.75rem 1rem; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: #e2e8f0; font-size: 0.875rem; outline: none; }
    input[type="text"]:focus { border-color: #38bdf8; }
    button { padding: 0.75rem 1.25rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.875rem; font-weight: 600; }
    #sendBtn { background: #0ea5e9; color: #fff; }
    #sendBtn:hover { background: #0284c7; }
    #analyzeBtn { background: #10b981; color: #fff; }
    #analyzeBtn:hover { background: #059669; }
    #micBtn { background: #334155; color: #e2e8f0; min-width: 44px; }
    #micBtn.active { background: #ef4444; }
    #attachBtn { background: #334155; color: #e2e8f0; min-width: 44px; }
    #attachBtn.has-image { background: #8b5cf6; }
    #preview { display: none; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    #preview img { max-height: 64px; border-radius: 4px; border: 1px solid #334155; }
    #preview .remove { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1rem; padding: 0 0.25rem; min-width: auto; }
    .status { text-align: center; margin-top: 0.75rem; font-size: 0.75rem; color: #64748b; }
    #speaking { text-align: center; margin-top: 0.5rem; font-size: 0.875rem; color: #facc15; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cultural Risk Intelligence</h1>
    <p class="subtitle">Real-time Cultural Risk Analysis via Gemini Live API</p>
    <div id="log"><div class="msg system">Connecting...</div></div>
    <div id="preview"><img id="thumb" /><button class="remove" id="removeImg">&times;</button></div>
    <input type="file" id="fileInput" accept="image/*" hidden />
    <div class="controls">
      <button id="micBtn" title="Voice input">&#x1f3a4;</button>
      <button id="attachBtn" title="Attach image">&#x1f4ce;</button>
      <input type="text" id="input" placeholder="Ask about cultural risks..." />
      <button id="sendBtn">Send</button>
      <button id="analyzeBtn">Deep Analyze</button>
    </div>
    <div class="status" id="status"></div>
    <div id="speaking">&#x1f50a; Speaking...</div>
  </div>
  <script>
    const log = document.getElementById("log");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const micBtn = document.getElementById("micBtn");
    const attachBtn = document.getElementById("attachBtn");
    const fileInput = document.getElementById("fileInput");
    const preview = document.getElementById("preview");
    const thumb = document.getElementById("thumb");
    const removeImg = document.getElementById("removeImg");
    const status = document.getElementById("status");

    let ws;
    let mediaStream;
    let audioCtx;
    let recording = false;
    const speaking = document.getElementById("speaking");

    /* --- Image attachment state --- */
    let pendingImage = null;   // { base64, mime_type }

    attachBtn.onclick = () => fileInput.click();

    fileInput.onchange = () => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = reader.result;                       // data:image/png;base64,xxxxx
        const base64 = dataUrl.split(",")[1];
        const mime_type = file.type || "image/jpeg";
        pendingImage = { base64, mime_type };
        thumb.src = dataUrl;
        preview.style.display = "flex";
        attachBtn.classList.add("has-image");
      };
      reader.readAsDataURL(file);
      fileInput.value = "";
    };

    removeImg.onclick = () => {
      pendingImage = null;
      preview.style.display = "none";
      attachBtn.classList.remove("has-image");
    };
    /* ----------------------------- */

    /* --- Audio playback queue (PCM 16-bit 24 kHz mono) --- */
    let playbackCtx;
    const audioQueue = [];
    let isPlaying = false;
    let nextStartTime = 0;

    function showSpeaking() { speaking.style.display = "block"; }
    function hideSpeaking() { speaking.style.display = "none"; }

    function playAudio(buffer) {
      if (!playbackCtx) playbackCtx = new AudioContext({ sampleRate: 24000 });
      /* PCM s16le → Float32 */
      const samples = buffer.byteLength / 2;
      const float32 = new Float32Array(samples);
      const view = new DataView(buffer);
      for (let i = 0; i < samples; i++) {
        float32[i] = view.getInt16(i * 2, true) / 32768;
      }
      audioQueue.push(float32);
      if (!isPlaying) drainQueue();
    }

    function drainQueue() {
      if (audioQueue.length === 0) { isPlaying = false; hideSpeaking(); return; }
      isPlaying = true;
      showSpeaking();

      const float32 = audioQueue.shift();
      const ab = playbackCtx.createBuffer(1, float32.length, 24000);
      ab.copyToChannel(float32, 0);
      const src = playbackCtx.createBufferSource();
      src.buffer = ab;
      src.connect(playbackCtx.destination);

      const now = playbackCtx.currentTime;
      const start = Math.max(now, nextStartTime);
      activeSources.push(src);
      src.start(start);
      nextStartTime = start + ab.duration;
      src.onended = () => {
        const idx = activeSources.indexOf(src);
        if (idx !== -1) activeSources.splice(idx, 1);
        drainQueue();
      };
    }
    /* ---------------------------------------------------- */

    /* 再生中断: キューをクリアし再生中のSourceを停止 */
    const activeSources = [];

    function stopPlayback() {
      audioQueue.length = 0;
      isPlaying = false;
      nextStartTime = 0;
      for (const src of activeSources) {
        try { src.stop(); } catch(_) {}
      }
      activeSources.length = 0;
      hideSpeaking();
    }

    function addMsg(text, cls) {
      const div = document.createElement("div");
      div.className = "msg " + cls;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function connect() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(`${proto}//${location.host}/ws/live`);
      ws.binaryType = "arraybuffer";

      ws.onopen = () => {
        addMsg("Connected", "system");
        status.textContent = "";
      };
      ws.onmessage = (e) => {
        if (typeof e.data === "string") {
          const msg = JSON.parse(e.data);
          if (msg.type === "text") addMsg(msg.data, "agent");
          else if (msg.type === "analysis") addMsg(msg.data, "analysis");
        } else {
          playAudio(e.data);
        }
      };
      ws.onclose = () => {
        addMsg("Disconnected. Reconnecting...", "system");
        setTimeout(connect, 3000);
      };
    }

    sendBtn.onclick = () => {
      const text = input.value.trim();
      if ((!text && !pendingImage) || ws.readyState !== 1) return;
      addMsg(text || "(image)", "user");
      const payload = { type: "message", data: text };
      if (pendingImage) {
        payload.image = pendingImage.base64;
        payload.mime_type = pendingImage.mime_type;
      }
      ws.send(JSON.stringify(payload));
      input.value = "";
      pendingImage = null;
      preview.style.display = "none";
      attachBtn.classList.remove("has-image");
    };

    analyzeBtn.onclick = () => {
      const text = input.value.trim();
      if (!text || ws.readyState !== 1) return;
      addMsg(`[Deep Analysis] ${text}`, "user");
      ws.send(JSON.stringify({ type: "analyze", query: text }));
      input.value = "";
      status.textContent = "Analyzing all markets in parallel...";
      setTimeout(() => { status.textContent = ""; }, 10000);
    };

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendBtn.click();
    });

    micBtn.onclick = async () => {
      if (recording) {
        recording = false;
        micBtn.classList.remove("active");
        if (mediaStream) mediaStream.getTracks().forEach((t) => t.stop());
        return;
      }
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 } });
        if (!audioCtx) audioCtx = new AudioContext({ sampleRate: 16000 });
        const source = audioCtx.createMediaStreamSource(mediaStream);
        const processor = audioCtx.createScriptProcessor(4096, 1, 1);
        processor.onaudioprocess = (e) => {
          if (!recording || ws.readyState !== 1) return;
          const float32 = e.inputBuffer.getChannelData(0);
          /* 簡易VAD: RMSが閾値以上のときだけ送信 */
          let rms = 0;
          for (let i = 0; i < float32.length; i++) rms += float32[i] * float32[i];
          rms = Math.sqrt(rms / float32.length);
          console.log("[MIC] rms:", rms.toFixed(4));
          if (rms < 0.01) return;   // 無音はスキップ
          /* 話し始めたら再生を止める（割り込み） */
          if (isPlaying) stopPlayback();
          const int16 = new Int16Array(float32.length);
          for (let i = 0; i < float32.length; i++) {
            int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
          }
          ws.send(int16.buffer);
        };
        source.connect(processor);
        processor.connect(audioCtx.destination);
        recording = true;
        micBtn.classList.add("active");
      } catch (err) {
        addMsg("Microphone access denied", "system");
      }
    };

    connect();
  </script>
</body>
</html>
