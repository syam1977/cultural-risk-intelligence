<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cultural Risk Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #08080e;
      --s1:         #0f0f18;
      --s2:         #171722;
      --s3:         #1f1f2e;
      --border:     #2e2e48;
      --border-hi:  #444466;
      --amber:      #f59e0b;
      --amber-lo:   #78490a;
      --cyan:       #00cfea;
      --cyan-lo:    #004450;
      --green:      #22c55e;
      --yellow:     #eab308;
      --orange:     #f97316;
      --red:        #ef4444;
      --text:       #dddbd0;
      --text-mid:   #b0b0cc;
      --text-dim:   #787898;
      --jp:         #f87171;
      --us:         #38bdf8;
      --fr:         #a78bfa;
      --de:         #fbbf24;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* scanline texture */
    body::after {
      content:'';
      position:fixed; inset:0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 4px
      );
      pointer-events:none;
      z-index:9999;
    }

    /* ── HEADER ──────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1.5rem;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }
    .logo-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--amber);
      line-height: 1;
    }
    .logo-sub {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      color: var(--text-mid);
      font-family: 'Share Tech Mono', monospace;
      text-transform: uppercase;
    }

    /* market chips */
    .market-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.28rem 0.7rem;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #9898b8;
      transition: all 0.25s ease;
      user-select: none;
    }
    .chip .led {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: all 0.25s ease;
      flex-shrink: 0;
    }

    .chip.active-jp { color: var(--jp); border-color: var(--jp); background: rgba(248,113,113,0.07); }
    .chip.active-jp .led { background: var(--jp); box-shadow: 0 0 7px var(--jp); }
    .chip.active-us { color: var(--us); border-color: var(--us); background: rgba(56,189,248,0.07); }
    .chip.active-us .led { background: var(--us); box-shadow: 0 0 7px var(--us); }
    .chip.active-fr { color: var(--fr); border-color: var(--fr); background: rgba(167,139,250,0.07); }
    .chip.active-fr .led { background: var(--fr); box-shadow: 0 0 7px var(--fr); }
    .chip.active-de { color: var(--de); border-color: var(--de); background: rgba(251,191,36,0.07); }
    .chip.active-de .led { background: var(--de); box-shadow: 0 0 7px var(--de); }

    .chip.pulsing { animation: chipBlink 0.7s ease-in-out infinite alternate; }
    @keyframes chipBlink { from { opacity:0.45; } to { opacity:1; } }

    .chip.deep-active-jp { color: var(--jp); border-color: var(--jp); background: rgba(248,113,113,0.1); }
    .chip.deep-active-jp .led { background: var(--jp); box-shadow: 0 0 7px var(--jp); }
    .chip.deep-active-us { color: var(--us); border-color: var(--us); background: rgba(56,189,248,0.1); }
    .chip.deep-active-us .led { background: var(--us); box-shadow: 0 0 7px var(--us); }
    .chip.deep-active-fr { color: var(--fr); border-color: var(--fr); background: rgba(167,139,250,0.1); }
    .chip.deep-active-fr .led { background: var(--fr); box-shadow: 0 0 7px var(--fr); }
    .chip.deep-active-de { color: var(--de); border-color: var(--de); background: rgba(251,191,36,0.1); }
    .chip.deep-active-de .led { background: var(--de); box-shadow: 0 0 7px var(--de); }

    /* connection status */
    .conn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-mid);
      letter-spacing: 0.05em;
    }
    .conn-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--red);
      transition: all 0.3s;
    }
    .conn-dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }

    /* ── MAIN GRID ───────────────────────────────────── */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 0;
      min-height: 0;
      overflow: hidden;
    }

    /* ── MAP PANEL ───────────────────────────────────── */
    .map-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--s1);
    }

    .panel-bar {
      padding: 0.4rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .panel-bar-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-mid);
    }
    .panel-bar-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-mid);
      letter-spacing: 0.06em;
    }

    .map-wrap {
      flex: 1;
      padding: 1rem;
      display: flex;
      align-items: stretch;
      justify-content: center;
      min-height: 0;
      overflow: hidden;
    }

    #worldMap {
      width: 100%;
      height: 100%;
      display: block;
      max-width: none;
    }

    /* SVG map styles */
    .land { fill: #191926; stroke: #252538; stroke-width: 0.6; }
    .land-hi { fill: #1e1e2e; }
    .graticule { fill: none; stroke: #151520; stroke-width: 0.4; }

    .mpin { cursor: default; }
    .mpin .ring-outer {
      fill: none;
      stroke-width: 1;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .mpin .ring-inner {
      fill: none;
      stroke-width: 1.5;
      opacity: 0.35;
    }
    .mpin .dot {
      stroke-width: 2;
      transition: all 0.3s;
    }
    .mpin .label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9.5px;
      font-weight: bold;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .mpin .sublabel {
      font-family: 'Share Tech Mono', monospace;
      font-size: 7px;
      text-anchor: middle;
      dominant-baseline: middle;
      opacity: 0.8;
    }

    /* active marker */
    .mpin.active .ring-outer { opacity: 1; animation: ringExpand 1.8s ease-out infinite; }
    .mpin.active .dot { filter: drop-shadow(0 0 4px currentColor); }

    @keyframes ringExpand {
      0%   { r: 12; opacity: 0.8; }
      100% { r: 26; opacity: 0; }
    }

    /* processing marker */
    .mpin.processing .dot { animation: dotFlash 0.45s ease-in-out infinite alternate; }
    @keyframes dotFlash { from { opacity:0.2; } to { opacity:1; } }

    /* risk color on dot after deep analyze */
    .mpin.risk-low  .dot { fill: var(--green) !important; stroke: var(--green) !important; }
    .mpin.risk-med  .dot { fill: var(--yellow) !important; stroke: var(--yellow) !important; }
    .mpin.risk-high .dot { fill: var(--orange) !important; stroke: var(--orange) !important; }
    .mpin.risk-crit .dot { fill: var(--red) !important; stroke: var(--red) !important; }

    /* ghost markets */
    .mpin-ghost { opacity: 0.18; }
    .mpin-ghost .label { fill: var(--text-mid); }
    .mpin-ghost .dot { fill: var(--text-dim); stroke: var(--text-dim); }

    /* ── RIGHT PANEL ─────────────────────────────────── */
    .right-panel {
      display: flex;
      flex-direction: column;
      background: var(--s1);
      min-height: 0;
      overflow: hidden;
    }

    /* log */
    #log {
      flex: 1;
      padding: 0.9rem 1rem;
      overflow-y: auto;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.9;
      min-height: 0;
    }
    #log::-webkit-scrollbar { width: 2px; }
    #log::-webkit-scrollbar-thumb { background: var(--border-hi); }

    .msg { padding: 0.15rem 0; }
    .msg.user   { color: var(--amber); }
    .msg.user::before   { content: '▶  '; }
    .msg.agent  { color: var(--cyan); }
    .msg.agent::before  { content: '◈  '; }
    .msg.analysis { color: #86efac; white-space: pre-wrap; font-size: 0.75rem; line-height: 1.6; word-break: break-word; }
    .msg.system { color: var(--text-mid); font-style: italic; }

    /* speaking */
    #speaking {
      display: none;
      align-items: center;
      gap: 0.6rem;
      padding: 0.45rem 1rem;
      border-top: 1px solid var(--border);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--cyan);
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }
    .vubars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
    }
    .vubar {
      width: 3px;
      background: var(--cyan);
      border-radius: 1px;
      animation: vu 0.4s ease-in-out infinite alternate;
    }
    .vubar:nth-child(1) { animation-delay:0s;     height:3px; }
    .vubar:nth-child(2) { animation-delay:0.12s;  height:8px; }
    .vubar:nth-child(3) { animation-delay:0.04s;  height:12px; }
    .vubar:nth-child(4) { animation-delay:0.16s;  height:5px; }
    .vubar:nth-child(5) { animation-delay:0.08s;  height:10px; }
    @keyframes vu { from { transform:scaleY(0.25); } to { transform:scaleY(1); } }

    /* Deep Analyze results */
    #analyzeResults {
      display: none;
      flex-direction: column;
      gap: 0.45rem;
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      max-height: 160px;
      overflow-y: auto;
    }
    #analyzeResults::-webkit-scrollbar { width: 2px; }
    #analyzeResults::-webkit-scrollbar-thumb { background: var(--border-hi); }
    .ar-header {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-mid);
      margin-bottom: 0.2rem;
    }
    .ar-row {
      display: grid;
      grid-template-columns: 30px 1fr 36px;
      align-items: center;
      gap: 0.6rem;
    }
    .ar-code {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .ar-track {
      height: 5px;
      background: var(--s3);
      border-radius: 1px;
      overflow: hidden;
    }
    .ar-fill {
      height: 100%;
      border-radius: 1px;
      width: 0%;
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
    }
    .ar-score {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      text-align: right;
      color: var(--text-mid);
    }

    /* image preview */
    #preview {
      display: none;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #thumb { max-height: 44px; border-radius: 2px; border: 1px solid var(--amber-lo); }
    .remove-img {
      background: none; border: none;
      color: var(--red); cursor: pointer;
      font-size: 1rem; padding: 0;
    }

    /* ── CONTROLS ─────────────────────────────────────── */
    .controls {
      border-top: 1px solid var(--border);
      background: var(--s1);
      padding: 0.85rem 1.25rem;
      flex-shrink: 0;
    }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    #textInput {
      flex: 1;
      padding: 0 1rem;
      height: 52px;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-size: 0.875rem;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 0.02em;
    }
    #textInput:focus { border-color: var(--amber-lo); }
    #textInput::placeholder { color: var(--text-dim); }

    /* circular transport buttons */
    .btn-round {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid var(--border-hi);
      background: var(--s2);
      color: var(--text-mid);
      font-size: 1.15rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.12s ease;
      box-shadow: 0 3px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04), inset 0 -2px 0 rgba(0,0,0,0.25);
      flex-shrink: 0;
      outline: none;
    }
    .btn-round:hover {
      border-color: var(--text-mid);
      color: var(--text);
      transform: translateY(-1px);
      box-shadow: 0 5px 12px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .btn-round:active {
      transform: translateY(1px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.5), inset 0 2px 4px rgba(0,0,0,0.35);
    }

    #micBtn.active {
      background: #3d0f0f;
      border-color: var(--red);
      color: var(--red);
      box-shadow: 0 3px 8px rgba(239,68,68,0.25), inset 0 1px 0 rgba(255,255,255,0.04);
      animation: micGlow 1.1s ease-in-out infinite;
    }
    @keyframes micGlow {
      0%,100% { box-shadow: 0 3px 8px rgba(239,68,68,0.25), inset 0 1px 0 rgba(255,255,255,0.04); }
      50%      { box-shadow: 0 3px 18px rgba(239,68,68,0.55), 0 0 24px rgba(239,68,68,0.15), inset 0 1px 0 rgba(255,255,255,0.04); }
    }

    #attachBtn.has-image {
      border-color: #5b21b6;
      color: var(--fr);
    }

    /* rectangular action buttons */
    .btn-rect {
      height: 52px;
      padding: 0 1.4rem;
      border-radius: 2px;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.12s ease;
      outline: none;
      flex-shrink: 0;
      box-shadow: 0 3px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04), inset 0 -2px 0 rgba(0,0,0,0.25);
    }
    .btn-rect:active {
      transform: translateY(1px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.5), inset 0 2px 4px rgba(0,0,0,0.35);
    }

    #sendBtn {
      background: var(--s3);
      border: 2px solid var(--amber-lo);
      color: var(--amber);
    }
    #sendBtn:hover {
      background: rgba(245,158,11,0.08);
      border-color: var(--amber);
      box-shadow: 0 3px 12px rgba(245,158,11,0.18), inset 0 1px 0 rgba(255,255,255,0.04);
      transform: translateY(-1px);
    }

    #analyzeBtn {
      background: linear-gradient(160deg, #052e1c, #064e3b);
      border: 2px solid #065f46;
      color: #34d399;
      padding: 0 1.6rem;
    }
    #analyzeBtn:hover {
      background: linear-gradient(160deg, #064e3b, #065f46);
      border-color: #10b981;
      box-shadow: 0 3px 14px rgba(0,0,0,0.5), 0 0 24px rgba(52,211,153,0.15), inset 0 1px 0 rgba(255,255,255,0.04);
      transform: translateY(-1px);
    }
    #analyzeBtn.processing {
      animation: analyzeGlow 1s ease-in-out infinite;
    }
    @keyframes analyzeGlow {
      0%,100% { box-shadow: 0 3px 8px rgba(0,0,0,0.5), 0 0 12px rgba(52,211,153,0.1); }
      50%      { box-shadow: 0 3px 14px rgba(0,0,0,0.5), 0 0 30px rgba(52,211,153,0.3); }
    }

    .status-line {
      margin-top: 0.5rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-mid);
      letter-spacing: 0.06em;
      text-align: center;
      min-height: 1em;
    }

    input[type="file"] { display: none; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <span class="logo-title">Cultural Risk Intelligence</span>
    <span class="logo-sub">Powered by Gemini Live API</span>
  </div>

  <div class="market-row">
    <div class="chip" id="chip-jp"><span class="led"></span>JP</div>
    <div class="chip" id="chip-us"><span class="led"></span>US</div>
    <div class="chip" id="chip-fr"><span class="led"></span>FR</div>
    <div class="chip" id="chip-de"><span class="led"></span>DE</div>
  </div>

  <div class="conn">
    <div class="conn-dot" id="connDot"></div>
    <span id="connLabel">OFFLINE</span>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- MAP -->
  <div class="map-panel">
    <div class="panel-bar">
      <span class="panel-bar-label">Market Coverage</span>
      <span class="panel-bar-tag">4 active agents · extensible via YAML</span>
    </div>
    <div class="map-wrap">
      <svg id="worldMap" viewBox="0 0 820 430" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="seaDots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
            <circle cx="7" cy="7" r="0.8" fill="#0a0a16"/>
          </pattern>
          <linearGradient id="landGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#4a6e5a"/>
            <stop offset="100%" stop-color="#2e4a3a"/>
          </linearGradient>
          <radialGradient id="vignette" cx="50%" cy="48%" r="65%">
            <stop offset="0%" stop-color="transparent"/>
            <stop offset="100%" stop-color="rgba(8,8,14,0.72)"/>
          </radialGradient>
          <linearGradient id="equatorGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="transparent"/>
            <stop offset="25%" stop-color="rgba(0,207,234,0.18)"/>
            <stop offset="75%" stop-color="rgba(0,207,234,0.18)"/>
            <stop offset="100%" stop-color="transparent"/>
          </linearGradient>
          <filter id="pinGlow" x="-150%" y="-150%" width="400%" height="400%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
            <feComposite in="SourceGraphic" in2="b" operator="over"/>
          </filter>
        </defs>

        <!-- Ocean -->
        <rect width="820" height="430" fill="#050508"/>
        <rect width="820" height="430" fill="url(#seaDots)"/>

        <!-- Graticule -->
        <g stroke="#141422" stroke-width="0.6" fill="none">
          <line x1="0" y1="43" x2="820" y2="43"/>
          <line x1="0" y1="96" x2="820" y2="96"/>
          <line x1="0" y1="155" x2="820" y2="155"/>
          <line x1="0" y1="215" x2="820" y2="215"/>
          <line x1="0" y1="274" x2="820" y2="274"/>
          <line x1="0" y1="334" x2="820" y2="334"/>
          <line x1="205" y1="0" x2="205" y2="430"/>
          <line x1="410" y1="0" x2="410" y2="430"/>
          <line x1="615" y1="0" x2="615" y2="430"/>
        </g>
        <line x1="0" y1="215" x2="820" y2="215" stroke="url(#equatorGrad)" stroke-width="1.2"/>

        <!-- Greenland -->
        <path fill="url(#landGrad)" stroke="#6a9070" stroke-width="0.7"
          d="M 248,20 L 275,14 L 302,20 L 310,36 L 300,50 L 278,58 L 254,48 Z"/>

        <!-- North America -->
        <path fill="url(#landGrad)" stroke="#6a9070" stroke-width="0.8"
          d="M 24,86 L 42,64 L 70,57 L 90,67 L 112,60 L 136,52 L 168,44 L 204,40
             L 240,54 L 255,70 L 282,72 L 292,90 L 265,105 L 242,115 L 234,130
             L 226,152 L 215,143 L 200,148 L 190,151 L 184,170 L 196,170 L 209,175
             L 215,186 L 218,194
             L 212,190 L 203,178 L 193,172 L 172,167 L 161,158 L 147,136
             L 128,100 L 118,88 L 96,76 L 72,80 L 42,82 Z"/>

        <!-- South America -->
        <path fill="url(#landGrad)" stroke="#6a9070" stroke-width="0.8"
          d="M 218,194 L 224,198 L 245,186 L 264,178 L 295,176 L 330,175
             L 345,194 L 348,224 L 338,265 L 315,296 L 296,308 L 274,318
             L 258,345 L 248,385 L 238,390 L 232,364 L 218,338
             L 208,305 L 200,268 L 200,248 L 210,218 Z"/>

<script>
  // ── DOM refs ──────────────────────────────────────────
  const log        = document.getElementById('log');
  const textInput  = document.getElementById('textInput');
  const sendBtn    = document.getElementById('sendBtn');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const micBtn     = document.getElementById('micBtn');
  const attachBtn  = document.getElementById('attachBtn');
  const fileInput  = document.getElementById('fileInput');
  const preview    = document.getElementById('preview');
  const thumb      = document.getElementById('thumb');
  const removeImg  = document.getElementById('removeImg');
  const statusLine = document.getElementById('statusLine');
  const speaking   = document.getElementById('speaking');
  const connDot    = document.getElementById('connDot');
  const connLabel  = document.getElementById('connLabel');
  const analyzeResults = document.getElementById('analyzeResults');

  // market UI elements
  const chips = { jp:'chip-jp', us:'chip-us', fr:'chip-fr', de:'chip-de' };
  const pins  = { jp:'pin-jp',  us:'pin-us',  fr:'pin-fr',  de:'pin-de'  };

  // ── State ─────────────────────────────────────────────
  let ws, mediaStream, audioCtx;
  let recording = false;
  let pendingImage = null;
  let activeMarket = null;

  // ── Image attachment ──────────────────────────────────
  attachBtn.onclick = () => fileInput.click();
  fileInput.onchange = () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = reader.result;
      pendingImage = { base64: dataUrl.split(',')[1], mime_type: file.type || 'image/jpeg' };
      thumb.src = dataUrl;
      preview.style.display = 'flex';
      attachBtn.classList.add('has-image');
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
  };
  removeImg.onclick = () => {
    pendingImage = null;
    preview.style.display = 'none';
    attachBtn.classList.remove('has-image');
  };

  // ── Market indicator helpers ──────────────────────────
  function clearAllMarkers() {
    Object.keys(chips).forEach(m => {
      const c = document.getElementById(chips[m]);
      c.className = 'chip';
      const p = document.getElementById(pins[m]);
      p.classList.remove('active','processing');
    });
  }

  function setActiveMarket(market) {
    clearAllMarkers();
    if (!market) return;
    activeMarket = market;
    const c = document.getElementById(chips[market]);
    if (c) c.className = `chip active-${market}`;
    const p = document.getElementById(pins[market]);
    if (p) p.classList.add('active');
  }

  function setProcessingMarkets(markets) {
    clearAllMarkers();
    markets.forEach(m => {
      const c = document.getElementById(chips[m]);
      if (c) { c.className = `chip deep-active-${m} pulsing`; }
      const p = document.getElementById(pins[m]);
      if (p) p.classList.add('processing');
    });
  }

  // Infer active market from message text
  function detectMarket(text) {
    const t = text.toLowerCase();
    if (t.includes('japan') || t.includes('japanese') || t.includes(' jp ')) return 'jp';
    if (t.includes('united states') || t.includes(' us ') || t.includes('america') || t.includes('u.s.')) return 'us';
    if (t.includes('france') || t.includes('french') || t.includes(' fr ')) return 'fr';
    if (t.includes('german') || t.includes('germany') || t.includes(' de ')) return 'de';
    return null;
  }

  // ── Risk score helpers ────────────────────────────────
  function scoreToColor(score) {
    if (score <= 30) return 'var(--green)';
    if (score <= 55) return 'var(--yellow)';
    if (score <= 75) return 'var(--orange)';
    return 'var(--red)';
  }
  function scoreToRiskClass(score) {
    if (score <= 30) return 'risk-low';
    if (score <= 55) return 'risk-med';
    if (score <= 75) return 'risk-high';
    return 'risk-crit';
  }

  // Parse risk scores from analysis text
  // Supports both multi-line ("JP: 45/100") and single-line comma-separated
  // ("Risk Score — JP: 45/100, US: 75/100, FR: 60/100, DE: 65/100") formats.
  function parseScores(text) {
    const patterns = {
      jp: /\bJP[:\s]+(\d+)(?:\s*\/\s*100)?/i,
      us: /\bUS(?:\/UK)?[:\s]+(\d+)(?:\s*\/\s*100)?/i,
      fr: /\bFR[:\s]+(\d+)(?:\s*\/\s*100)?/i,
      de: /\bDE[:\s]+(\d+)(?:\s*\/\s*100)?/i,
    };
    const scores = {};
    for (const [market, re] of Object.entries(patterns)) {
      const match = text.match(re);
      if (match) {
        scores[market] = Math.min(parseInt(match[1], 10), 100);
      }
    }
    // Fallback: keyword-based heuristic for markets not matched above
    const riskWords = {
      critical: 90, high: 75, significant: 68, moderate: 50,
      medium: 45, low: 25, minimal: 15, minor: 20
    };
    for (const market of Object.keys(patterns)) {
      if (scores[market]) continue;
      const lc = text.toLowerCase();
      const idx = lc.indexOf(market);
      if (idx < 0) continue;
      const snippet = lc.slice(Math.max(0, idx - 30), idx + 80);
      for (const [word, val] of Object.entries(riskWords)) {
        if (snippet.includes(word)) { scores[market] = val; break; }
      }
      if (!scores[market]) scores[market] = 50;
    }
    return scores;
  }

  function showAnalyzeResults(scores) {
    analyzeResults.style.display = 'flex';
    ['jp','us','fr','de'].forEach(m => {
      const s = scores[m] || 50;
      const fill  = document.getElementById(`fill-${m}`);
      const score = document.getElementById(`score-${m}`);
      const pin   = document.getElementById(pins[m]);
      const color = scoreToColor(s);
      setTimeout(() => {
        fill.style.width = s + '%';
        fill.style.background = color;
        score.textContent = s;
        score.style.color = color;
        if (pin) {
          pin.classList.remove('processing');
          pin.className = `mpin ${scoreToRiskClass(s)}`;
        }
        // update chip color
        const c = document.getElementById(chips[m]);
        if (c) {
          c.className = `chip deep-active-${m}`;
          c.querySelector('.led').style.background = color;
          c.querySelector('.led').style.boxShadow = `0 0 7px ${color}`;
        }
      }, (['jp','us','fr','de'].indexOf(m) * 180));
    });
  }

  // ── Audio playback ────────────────────────────────────
  let playbackCtx, audioQueue = [], isPlaying = false, nextStartTime = 0;
  const activeSources = [];

  function showSpeaking() { speaking.style.display = 'flex'; }
  function hideSpeaking() { speaking.style.display = 'none'; }

  function playAudio(buffer) {
    if (!playbackCtx) playbackCtx = new AudioContext({ sampleRate: 24000 });
    const samples = buffer.byteLength / 2;
    const f32 = new Float32Array(samples);
    const view = new DataView(buffer);
    for (let i = 0; i < samples; i++) f32[i] = view.getInt16(i * 2, true) / 32768;
    audioQueue.push(f32);
    if (!isPlaying) drainQueue();
  }

  function drainQueue() {
    if (!audioQueue.length) { isPlaying = false; hideSpeaking(); return; }
    isPlaying = true; showSpeaking();
    const f32 = audioQueue.shift();
    const ab = playbackCtx.createBuffer(1, f32.length, 24000);
    ab.copyToChannel(f32, 0);
    const src = playbackCtx.createBufferSource();
    src.buffer = ab; src.connect(playbackCtx.destination);
    const now = playbackCtx.currentTime;
    const start = Math.max(now, nextStartTime);
    activeSources.push(src);
    src.start(start);
    nextStartTime = start + ab.duration;
    src.onended = () => {
      const i = activeSources.indexOf(src);
      if (i !== -1) activeSources.splice(i, 1);
      drainQueue();
    };
  }

  function stopPlayback() {
    audioQueue.length = 0; isPlaying = false; nextStartTime = 0;
    activeSources.forEach(s => { try { s.stop(); } catch(_) {} });
    activeSources.length = 0; hideSpeaking();
  }

  // ── Log helper ────────────────────────────────────────
  function addMsg(text, cls) {
    const d = document.createElement('div');
    d.className = 'msg ' + cls;
    d.textContent = text;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  }

  // ── WebSocket ─────────────────────────────────────────
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws/live`);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      connDot.classList.add('on');
      connLabel.textContent = 'LIVE';
      addMsg('Session ready. Advisor is standing by.', 'system');
      statusLine.textContent = '';
    };

    // ── Text buffering for streaming transcription ──────
    let agentBuffer = '';
    let agentDiv = null;
    let agentFlushTimer = null;

    function flushAgentBuffer() {
      if (!agentBuffer) return;
      const m = detectMarket(agentBuffer);
      if (m) setActiveMarket(m);
      agentBuffer = '';
      agentDiv = null;
      agentFlushTimer = null;
    }

    function appendAgentText(chunk) {
      agentBuffer += chunk;
      if (!agentDiv) {
        agentDiv = document.createElement('div');
        agentDiv.className = 'msg agent';
        log.appendChild(agentDiv);
      }
      agentDiv.textContent = agentBuffer;
      log.scrollTop = log.scrollHeight;
      // flush after 1.5s of silence
      clearTimeout(agentFlushTimer);
      agentFlushTimer = setTimeout(flushAgentBuffer, 1500);
    }

    // ── Voice trigger for Deep Analyze ──────────────────
    const voiceTriggerPatterns = [
      /analyze all markets/i,
      /run the full analysis/i,
      /deep analyze/i,
      /all four markets simultaneously/i,
    ];
    let deepAnalyzeRunning = false;

    function checkVoiceTrigger(transcript) {
      if (deepAnalyzeRunning) return;
      if (!voiceTriggerPatterns.some(re => re.test(transcript))) return;
      if (ws?.readyState !== 1) return;
      const query = textInput.value.trim() || lastQuery;
      if (!query && !pendingImage) return;

      statusLine.textContent = 'Voice trigger detected — starting deep analysis...';
      deepAnalyzeRunning = true;
      analyzeBtn.click();
    }

    ws.onmessage = (e) => {
      if (typeof e.data === 'string') {
        const msg = JSON.parse(e.data);
        if (msg.type === 'text') {
          appendAgentText(msg.data);
        } else if (msg.type === 'user_transcript') {
          addMsg(msg.data, 'user');
          lastQuery = msg.data;
          checkVoiceTrigger(msg.data);
        } else if (msg.type === 'analysis') {
          // flush any pending agent text first
          flushAgentBuffer();
          addMsg(msg.data, 'analysis');
          analyzeBtn.classList.remove('processing');
          deepAnalyzeRunning = false;
          statusLine.textContent = '';
          const scores = parseScores(msg.data);
          showAnalyzeResults(scores);
          clearAllMarkers();
        }
      } else {
        playAudio(e.data);
      }
    };

    ws.onclose = () => {
      connDot.classList.remove('on');
      connLabel.textContent = 'OFFLINE';
      addMsg('Connection lost. Reconnecting...', 'system');
      setTimeout(connect, 3000);
    };
  }

  // ── Send message ──────────────────────────────────────
  sendBtn.onclick = () => {
    const text = textInput.value.trim();
    if ((!text && !pendingImage) || ws?.readyState !== 1) return;
    addMsg(text || '(image)', 'user');
    const payload = { type: 'message', data: text };
    if (pendingImage) { payload.image = pendingImage.base64; payload.mime_type = pendingImage.mime_type; }
    lastQuery = text;
    ws.send(JSON.stringify(payload));
    textInput.value = '';
    pendingImage = null;
    preview.style.display = 'none';
    attachBtn.classList.remove('has-image');
  };

  textInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendBtn.click(); });

  // ── Deep Analyze ──────────────────────────────────────
  let lastQuery = '';
  analyzeBtn.onclick = () => {
    const text = textInput.value.trim() || lastQuery;
    if (!text) {
      statusLine.textContent = 'Type a query first, then press Deep Analyze.';
      setTimeout(() => { statusLine.textContent = ''; }, 3000);
      return;
    }
    if (ws?.readyState !== 1) {
      statusLine.textContent = 'Reconnecting... please try again in a moment.';
      setTimeout(() => { statusLine.textContent = ''; }, 3000);
      return;
    }
    addMsg(`[Deep Analysis] ${text}`, 'user');
    const payload = { type: 'analyze', query: text };
    if (pendingImage) { payload.image = pendingImage.base64; payload.mime_type = pendingImage.mime_type; }
    ws.send(JSON.stringify(payload));
    textInput.value = '';
    pendingImage = null;
    preview.style.display = 'none';
    attachBtn.classList.remove('has-image');
    analyzeBtn.classList.add('processing');
    analyzeResults.style.display = 'none';
    // Reset bars
    ['jp','us','fr','de'].forEach(m => {
      document.getElementById(`fill-${m}`).style.width = '0%';
      document.getElementById(`score-${m}`).textContent = '—';
    });
    setProcessingMarkets(['jp','us','fr','de']);
    statusLine.textContent = '⬡ Dispatching agents to all four markets simultaneously...';
    setTimeout(() => { if (statusLine.textContent.startsWith('⬡')) statusLine.textContent = ''; }, 30000);
  };

  // ── Microphone ────────────────────────────────────────
  micBtn.onclick = async () => {
    if (recording) {
      recording = false;
      micBtn.classList.remove('active');
      if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
      return;
    }
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 } });
      if (!audioCtx) audioCtx = new AudioContext({ sampleRate: 16000 });
      const source = audioCtx.createMediaStreamSource(mediaStream);
      const processor = audioCtx.createScriptProcessor(4096, 1, 1);
      processor.onaudioprocess = (e) => {
        if (!recording || ws?.readyState !== 1) return;
        const f32 = e.inputBuffer.getChannelData(0);
        let rms = 0;
        for (let i = 0; i < f32.length; i++) rms += f32[i] * f32[i];
        rms = Math.sqrt(rms / f32.length);
        if (rms < 0.01) return;
        if (isPlaying) stopPlayback();
        const i16 = new Int16Array(f32.length);
        for (let i = 0; i < f32.length; i++) i16[i] = Math.max(-32768, Math.min(32767, f32[i] * 32768));
        ws.send(i16.buffer);
      };
      source.connect(processor);
      processor.connect(audioCtx.destination);
      recording = true;
      micBtn.classList.add('active');
    } catch (err) {
      addMsg('Microphone access denied', 'system');
    }
  };

  // ── Init ──────────────────────────────────────────────
  connect();
</script>
</body>
